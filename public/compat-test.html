<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>兼容性隔离测试</title>
</head>
<body>
  <h1>兼容性隔离测试</h1>
  <p id="userAgent"></p>
  <p>
    <button id="startTest" type="button">开始测试 Dashboard</button>
    <button id="pingTest" type="button">同步测试 Ping</button>
  </p>
  <div id="summary"></div>
  <div id="logs"></div>
  <script>
  (function () {
    var logs = document.getElementById('logs');
    var summary = document.getElementById('summary');

    function addLog(message) {
      var row = document.createElement('pre');
      row.appendChild(document.createTextNode(new Date().toISOString() + ' ' + message));
      logs.appendChild(row);
      window.scrollTo(0, document.body.scrollHeight);
    }

    function responseLength(xhr) {
      try {
        return xhr.responseText ? xhr.responseText.length : 0;
      } catch (error) {
        return 'unavailable';
      }
    }

    function showDashboardResult(xhr) {
      var preview;
      var data;
      addLog('xhr:onload status=' + xhr.status + ' responseText.length=' + responseLength(xhr));
      preview = xhr.responseText.substring(0, 200);
      addLog('response:preview ' + preview);
      addLog('response:totalLength ' + xhr.responseText.length);
      addLog('JSON.parse:start');
      try {
        data = JSON.parse(xhr.responseText);
        addLog('JSON.parse:success');
        summary.innerHTML = '';
        summary.appendChild(document.createTextNode('指标数量：' + data.indicators.length + '；事件数量：' + data.events.length));
        addLog('render:success indicators=' + data.indicators.length + ' events=' + data.events.length);
      } catch (error) {
        addLog('JSON.parse:error ' + error.name + ': ' + error.message);
      }
    }

    function startDashboardTest() {
      var xhr;
      addLog('script:start');
      try {
        xhr = new XMLHttpRequest();
        addLog('xhr:create');
        xhr.onreadystatechange = function () {
          addLog('xhr:readystatechange readyState=' + xhr.readyState + ' status=' + xhr.status + ' responseText.length=' + responseLength(xhr));
        };
        xhr.onload = function () { showDashboardResult(xhr); };
        xhr.onerror = function () { addLog('xhr:onerror readyState=' + xhr.readyState + ' status=' + xhr.status); };
        xhr.ontimeout = function () { addLog('xhr:ontimeout timeout=' + xhr.timeout); };
        xhr.onabort = function () { addLog('xhr:onabort'); };
        xhr.open('GET', '/api/dashboard-compat?t=' + new Date().getTime(), true);
        addLog('xhr:open');
        xhr.timeout = 10000;
        xhr.send(null);
        addLog('xhr:send');
      } catch (error) {
        addLog('xhr:throw ' + error.name + ': ' + error.message);
      }
    }

    function startPingTest() {
      var xhr;
      addLog('ping:script:start');
      try {
        xhr = new XMLHttpRequest();
        addLog('ping:xhr:create');
        xhr.open('GET', '/api/ping-text?t=' + new Date().getTime(), false);
        addLog('ping:xhr:open synchronous=true');
        xhr.send(null);
        addLog('ping:xhr:send:complete status=' + xhr.status + ' responseText.length=' + responseLength(xhr));
        addLog('ping:response ' + xhr.responseText);
      } catch (error) {
        addLog('ping:xhr:error ' + error.name + ': ' + error.message);
      }
    }

    document.getElementById('userAgent').appendChild(document.createTextNode('navigator.userAgent: ' + navigator.userAgent));
    document.getElementById('startTest').onclick = startDashboardTest;
    document.getElementById('pingTest').onclick = startPingTest;
    addLog('script:start');
  }());
  </script>
</body>
</html>
