name: Pull Request Engineering Checks

on:
  pull_request:
    branches:
      - staging
      - main

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout proposed commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Audit dependencies (non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Check tracked JavaScript syntax
        run: git ls-files -z '*.js' | xargs -0 -n1 node --check

      - name: Check engineering standards
        run: npm run check:engineering

      - name: Run tests
        run: npm test

      - name: Run lint when configured
        run: npm run lint --if-present

      - name: Build when configured
        run: npm run build --if-present
